name: everglow-api

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-everglow_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-everglow_db}
      MYSQL_USER: ${MYSQL_USER:-everglow_dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-everglow_pass}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - everglow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-everglow_root}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-everglow_dev}:${MYSQL_PASSWORD:-everglow_pass}@db:3306/${MYSQL_DATABASE:-everglow_db}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${MYSQL_USER:-everglow_dev}:${MYSQL_PASSWORD:-everglow_pass}@db:3306/${MYSQL_DATABASE:-everglow_db}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v2').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  everglow_mysql_data:
