name: everglow-api

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-everglow_db}
      POSTGRES_USER: ${POSTGRES_USER:-everglow_dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-everglow_pass}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - everglow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-everglow_dev} -d ${POSTGRES_DB:-everglow_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-everglow_dev}:${POSTGRES_PASSWORD:-everglow_pass}@db:5432/${POSTGRES_DB:-everglow_db}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-everglow_dev}:${POSTGRES_PASSWORD:-everglow_pass}@db:5432/${POSTGRES_DB:-everglow_db}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v2').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  everglow_postgres_data:
