name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'api/**'
              - '.github/workflows/**'
            mobile:
              - 'mobile/**'
              - 'api/openapi/**'
              - '.github/workflows/**'

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - run: npm run format:check
        background: true
      - name: OpenAPI spec is up to date
        run: npm run openapi:check
        background: true
      # Avoid --fix in CI (npm scripts must not mutate files)
      - run: npx eslint "{src,apps,libs,test}/**/*.ts"
        background: true
      - run: npm test
        background: true
      - wait-all:

      - run: npm run test:e2e

      - run: npm run build

      - name: Validate docker-compose config
        # compose requires .env to exist (env_file); stub it from the example
        run: cp .env.example .env && docker compose config -q

      - uses: docker/setup-buildx-action@v3

      - name: Docker image builds
        uses: docker/build-push-action@v6
        with:
          context: api
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mobile:
    name: Mobile
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci

      - run: npm run format:check
        background: true
      - name: Generated API types are up to date
        run: npm run openapi:check
        background: true
      - run: npm run lint
        background: true
      - run: npx tsc --noEmit
        background: true
      - wait-all:

  ci-success:
    name: CI
    needs: [changes, api, mobile]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require passing jobs
        run: |
          FAILED=0
          check_job() {
            name="$1"
            result="$2"
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              echo "$name job: $result (see that job's logs for details)"
              FAILED=1
            fi
          }
          check_job "API" "${{ needs.api.result }}"
          check_job "Mobile" "${{ needs.mobile.result }}"
          if [ "$FAILED" = "1" ]; then
            exit 1
          fi
          echo "All executed jobs passed (or were skipped)."
